<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Figure QA harness</title>
<link rel="stylesheet" href="css/theme.css">
<style>
  html,body{margin:0;width:100%;height:100%;background:#FAF8F3;overflow:hidden;}
  #m{position:absolute;inset:18px;}
  #m svg{width:100%;height:100%;display:block;}
</style>
</head>
<body>
<div id="m" class="figmount"></div>
<script src="js/data.js"></script>
<script src="js/mdc-core.js"></script>
<script>
  // Load the requested figure module (plus any figure modules it depends on, so composite
  // figures like `robustness` — which embeds `figS8` — render in isolation too).
  var p = new URLSearchParams(location.search);
  var fig = p.get('fig');
  var step = p.get('step') != null ? +p.get('step') : 99;
  MDC.qaStatic = true;
  var DEPS = { robustness: ['figS8'] };
  var queue = (DEPS[fig] || []).concat(fig);

  function loadNext() {
    if (!queue.length) {
      try {
        var ctrl = MDC.figures[fig](document.getElementById('m'), { animate: true, palette: MDC.palette });
        ctrl.play(Math.min(step, ctrl.steps));
        window.__qaReady = true;
      } catch (e) {
        document.body.innerHTML = '<pre style="color:#B23B3B;padding:20px">' + (e && e.stack || e) + '</pre>';
      }
      return;
    }
    var name = queue.shift();
    var sc = document.createElement('script');
    sc.src = 'js/figures/' + name + '.js';
    sc.onload = loadNext;
    sc.onerror = function () { document.body.innerHTML = '<pre style="color:#B23B3B;padding:20px">failed to load module: ' + name + '</pre>'; };
    document.body.appendChild(sc);
  }
  loadNext();
</script>
</body>
</html>
